name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build app and DMG
        run: ./build.sh --dmg

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/URLRouter.dmg
          generate_release_notes: true
