name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: ./build.sh --dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: URLRouter
          path: build/URLRouter.dmg
